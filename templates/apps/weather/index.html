<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Weather</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <main class="screen">
    <section class="hero">
      <div class="label">Weather</div>
      <div class="temp" id="temp">26</div>
      <div class="summary" id="summary">Cloudy · AQI 42</div>
    </section>
    <section class="grid">
      <button class="tile" data-mode="hourly">Hourly</button>
      <button class="tile" data-mode="daily">Daily</button>
      <button class="tile" data-mode="air">Air</button>
      <button class="tile" data-mode="units">Units</button>
    </section>
  </main>
  <script src="scripts/app.js"></script>
</body>
</html>
