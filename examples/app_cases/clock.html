<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>WearWeb Clock</title>
  <link rel="stylesheet" href="clock.css">
</head>
<body>
  <main class="app">
    <h1>Clock</h1>
    <section class="face">
      <strong id="time">--:--</strong>
      <span id="date">Tap refresh</span>
    </section>
    <button id="refresh">Refresh</button>
    <p id="note">Automatic ticking needs the M6 timer queue.</p>
  </main>
</body>
</html>
