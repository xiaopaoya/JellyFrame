<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>WearWeb Timer</title>
  <link rel="stylesheet" href="timer.css">
</head>
<body>
  <main class="app">
    <h1>Timer</h1>
    <section class="display">
      <strong id="time">00:00</strong>
      <span id="state">Stopped</span>
    </section>
    <button id="tick">+1s</button>
    <button id="toggle">Start</button>
    <button id="reset">Reset</button>
    <p id="note">M6 will replace manual ticks with setInterval.</p>
  </main>
</body>
</html>
