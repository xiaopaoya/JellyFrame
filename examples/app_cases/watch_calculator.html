<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>WearWeb Watch Calculator</title>
  <link rel="stylesheet" href="watch_calculator.css">
</head>
<body>
  <div class="watch-calculator">
    <div class="display-row">
      <div id="display" class="display">0</div>
      <button id="delete" class="delete-key" aria-label="Delete">&#215;</button>
    </div>

    <div class="keypad">
      <button id="clear" class="key utility">C</button>
      <button id="sign" class="key utility">&#177;</button>
      <button id="tip" class="key utility tip">TIP</button>
      <button id="divide" class="key operator">&#247;</button>

      <button id="n7" class="key digit">7</button>
      <button id="n8" class="key digit">8</button>
      <button id="n9" class="key digit">9</button>
      <button id="multiply" class="key operator">&#215;</button>

      <button id="n4" class="key digit">4</button>
      <button id="n5" class="key digit">5</button>
      <button id="n6" class="key digit">6</button>
      <button id="subtract" class="key operator">&#8722;</button>

      <button id="n1" class="key digit">1</button>
      <button id="n2" class="key digit">2</button>
      <button id="n3" class="key digit">3</button>
      <button id="add" class="key operator">+</button>

      <button id="n0" class="key digit zero">0</button>
      <button id="decimal" class="key digit">.</button>
      <button id="equals" class="key operator">=</button>
    </div>
  </div>

  <script src="watch_calculator.js"></script>
</body>
</html>
