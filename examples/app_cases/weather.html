<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>WearWeb Weather</title>
  <link rel="stylesheet" href="weather.css">
</head>
<body>
  <main class="app">
    <h1>Weather</h1>
    <section class="hero">
      <p id="city">Shanghai</p>
      <strong id="temperature">24 C</strong>
      <span id="condition">Cloudy</span>
    </section>
    <label>City</label>
    <select id="cityPicker">
      <option value="Shanghai" selected>Shanghai</option>
      <option value="Shenzhen">Shenzhen</option>
      <option value="Beijing">Beijing</option>
    </select>
    <button id="unit">Use F</button>
    <section class="row">
      <p>Humidity <strong id="humidity">68%</strong></p>
      <p>Wind <strong id="wind">12 km/h</strong></p>
    </section>
  </main>
</body>
</html>
