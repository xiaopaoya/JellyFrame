<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Jelly Watch Face</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <main class="face">
    <section class="dial" aria-label="Analog watch face">
      <div class="ring"><div class="ring-hole"></div></div>
      <div class="tick t0"></div>
      <div class="tick t1"></div>
      <div class="tick t2"></div>
      <div class="tick t3"></div>
      <div id="hourHand" class="hand hour"></div>
      <div id="minuteHand" class="hand minute"></div>
      <div id="secondHand" class="hand second"></div>
      <div class="cap"></div>
      <div class="time">
        <strong id="digitalTime">09:30</strong>
        <span id="dateLabel">Jelly</span>
      </div>
    </section>
  </main>
  <script src="scripts/app.js"></script>
</body>
</html>
