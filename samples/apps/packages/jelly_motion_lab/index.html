<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Jelly Motion Lab</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <main id="screen" class="screen">
    <section class="hero">
      <span class="label">Motion Lab</span>
      <strong id="frame">00</strong>
    </section>

    <section class="stage">
      <button id="icon" class="app-icon">J</button>
      <article id="window" class="window">
        <span class="window-gloss"></span>
        <strong>Jelly Notes</strong>
        <p>Icon to app window, using scale and opacity only.</p>
      </article>
    </section>

    <section id="sheet" class="sheet">
      <strong>Quick Sheet</strong>
      <span>Elastic bottom panel</span>
    </section>

    <section class="dock">
      <button id="pulse" class="pill active">Open</button>
      <button class="pill">Sheet</button>
      <button class="pill">Press</button>
    </section>
  </main>
  <script src="scripts/app.js"></script>
</body>
</html>
