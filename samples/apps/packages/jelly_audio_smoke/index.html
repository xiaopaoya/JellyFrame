<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Audio Smoke</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <main class="app">
    <section class="orb">
      <span class="pulse"></span>
      <h1>Audio</h1>
      <p id="status">Ready</p>
    </section>
    <section class="panel">
      <p class="label">Package resource</p>
      <p class="value">/audio/tone.wav</p>
      <button id="play" type="button">Play tone</button>
    </section>
  </main>
  <script src="scripts/app.js"></script>
</body>
</html>
