<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Calculator</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <main class="screen" id="app">
    <section class="display-panel">
      <span id="status">Ready</span>
      <input id="display" value="0">
    </section>
    <section class="keys">
      <button class="soft" data-op="clear"><span>C</span></button>
      <button class="soft" data-op="+"><span>+</span></button>
      <button class="soft" data-op="-"><span>-</span></button>
      <button class="num" data-key="7"><span>7</span></button>
      <button class="num" data-key="8"><span>8</span></button>
      <button class="num" data-key="9"><span>9</span></button>
      <button class="num" data-key="4"><span>4</span></button>
      <button class="num" data-key="5"><span>5</span></button>
      <button class="num" data-key="6"><span>6</span></button>
      <button class="num" data-key="1"><span>1</span></button>
      <button class="num" data-key="2"><span>2</span></button>
      <button class="num" data-key="3"><span>3</span></button>
      <button class="num wide" data-key="0"><span>0</span></button>
      <button class="equals" data-op="="><span>=</span></button>
    </section>
  </main>
  <script src="scripts/app.js"></script>
</body>
</html>
