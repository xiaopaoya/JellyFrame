<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Calculator</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <main class="screen" id="app">
    <section class="topbar">
      <span class="app-title">Pocket Math</span>
      <span id="status" class="status">Ready</span>
    </section>
    <section class="display-panel">
      <span class="hint">Quick totals</span>
      <input id="display" value="0">
    </section>
    <section class="keys">
      <button class="num" data-key="7">7</button>
      <button class="num" data-key="8">8</button>
      <button class="num" data-key="9">9</button>
      <button class="op" data-op="+">ADD</button>
      <button class="num" data-key="4">4</button>
      <button class="num" data-key="5">5</button>
      <button class="num" data-key="6">6</button>
      <button class="op" data-op="-">SUB</button>
      <button class="num" data-key="1">1</button>
      <button class="num" data-key="2">2</button>
      <button class="num" data-key="3">3</button>
      <button class="equals" data-op="=">OK</button>
      <button class="danger wide" data-op="clear">C</button>
      <button class="num wide" data-key="0">0</button>
    </section>
  </main>
  <script src="scripts/app.js"></script>
</body>
</html>
