<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Weather</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <main class="screen" id="app">
    <section class="hero">
      <div class="topline">
        <span id="place">Harbor</span>
        <span id="updated" class="meta">Now</span>
      </div>
      <div class="label">Weather</div>
      <div class="temp" id="temp">24</div>
      <div class="summary" id="summary">Bright breaks</div>
    </section>
    <section class="hours">
      <button class="hour active" data-mode="now"><span>Now</span><strong>24</strong></button>
      <button class="hour" data-mode="hourly"><span>14</span><strong>26</strong></button>
      <button class="hour" data-mode="daily"><span>15</span><strong>25</strong></button>
      <button class="hour" data-mode="air"><span>AQI</span><strong>38</strong></button>
    </section>
    <section class="stats">
      <div class="metric"><span>Wind</span><strong id="wind">7</strong></div>
      <div class="metric"><span>Rain</span><strong id="rain">12%</strong></div>
    </section>
  </main>
  <script src="scripts/app.js"></script>
</body>
</html>
