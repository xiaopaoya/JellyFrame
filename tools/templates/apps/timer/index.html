<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Timer</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <main class="screen" id="app">
    <section class="topline">
      <span>Focus</span>
      <span id="round" class="meta">1/4</span>
    </section>
    <section class="dial">
      <div class="track">
        <div class="inside">
          <span id="state">Stopped</span>
          <strong id="time">00:00</strong>
        </div>
      </div>
    </section>
    <section class="segments">
      <div class="seg active"></div>
      <div class="seg"></div>
      <div class="seg"></div>
      <div class="seg"></div>
    </section>
    <section class="actions">
      <button data-action="tick"><span>+1s</span></button>
      <button data-action="toggle" id="toggle"><span>Start</span></button>
      <button data-action="reset"><span>Reset</span></button>
    </section>
  </main>
  <script src="scripts/app.js"></script>
</body>
</html>
