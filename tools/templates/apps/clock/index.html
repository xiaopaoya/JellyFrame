<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Clock</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <main class="screen">
    <section class="topbar">
      <span>Today</span>
      <span id="zone" class="meta">Local</span>
    </section>
    <section class="face">
      <span class="orbit"></span>
      <strong id="time">07:30</strong>
      <span id="note">Morning routine</span>
    </section>
    <section class="metrics">
      <div><strong id="steps">6.4k</strong><span>steps</span></div>
      <div><strong id="heart">72</strong><span>bpm</span></div>
    </section>
    <section class="actions">
      <button id="refresh">Next</button>
      <button id="zoneButton">Zone</button>
    </section>
  </main>
  <script src="scripts/app.js"></script>
</body>
</html>
