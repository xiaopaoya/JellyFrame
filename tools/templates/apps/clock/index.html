<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Clock</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <main class="screen">
    <section class="topline">
      <span>Dayline</span>
      <span id="zone" class="meta">08</span>
    </section>
    <section class="time-card">
      <span id="phase" class="phase">Morning</span>
      <strong id="time">07:30</strong>
      <span id="note">Start steady</span>
    </section>
    <section class="metrics">
      <div><span>Move</span><strong id="steps">6.4k</strong></div>
      <div><span>Pulse</span><strong id="heart">72</strong></div>
    </section>
    <section class="actions">
      <button id="refresh"><span>Next</span></button>
      <button id="zoneButton"><span>Zone</span></button>
    </section>
  </main>
  <script src="scripts/app.js"></script>
</body>
</html>
